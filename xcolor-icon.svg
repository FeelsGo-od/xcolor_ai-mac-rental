<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- 外圈 -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  
  <!-- 桥梁符号 -->
  <path d="M20,60 Q50,30 80,60" stroke="url(#bridgeGradient)" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- 连接点 -->
  <circle cx="20" cy="60" r="6" fill="#ffffff"/>
  <circle cx="50" cy="35" r="4" fill="#ffffff"/>
  <circle cx="80" cy="60" r="6" fill="#ffffff"/>
  
  <!-- X 字母 (代表 XColor) -->
  <path d="M40,75 L60,85 M60,75 L40,85" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
</svg>